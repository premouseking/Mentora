# Mentora 云服务器反向代理
# 对外仅暴露 80/443；前端、API、MinIO 直传均经 nginx 转发。
#
# 安装：
#   sudo cp infra/nginx/mentora.conf /etc/nginx/sites-available/mentora
#   sudo ln -sf /etc/nginx/sites-available/mentora /etc/nginx/sites-enabled/mentora
#   sudo nginx -t && sudo systemctl reload nginx
#
# 环境变量（.env）：
#   DJANGO_ALLOWED_HOSTS=<公网IP>,localhost,127.0.0.1
#   OBJECT_STORAGE_PUBLIC_ENDPOINT=http://<公网IP>
#   MENTORA_API_BASE_URL=http://<公网IP>/api

server {
    listen 80;
    server_name 124.222.211.202;

    client_max_body_size 500m;

    # MinIO path-style：/{bucket}/{key}
    location /mentora/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, PUT, POST, HEAD, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, x-amz-date, x-amz-content-sha256, x-amz-security-token" always;
        add_header Access-Control-Expose-Headers "ETag" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://127.0.0.1:9000/mentora/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vite dev server（含 HMR WebSocket）
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
