name: mentora

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mentora}
      POSTGRES_USER: ${POSTGRES_USER:-mentora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mentora}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mentora}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-56379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-mentora}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-mentora-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    profiles: ["app"]
    restart: unless-stopped
    build:
      context: ../../apps/api
      args:
        MENTORA_API_SOURCE_HASH: ${MENTORA_API_SOURCE_HASH:-}
    image: mentora-api
    env_file:
      - ../../.env
    environment:
      DJANGO_DEBUG: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORAGE_BACKEND: s3
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-mentora}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-mentora}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-mentora-secret}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
      DEV_OWNER_ID: ${DEV_OWNER_ID:-dev-user}
      MENTORA_DEV_AUTH_BYPASS: ${MENTORA_DEV_AUTH_BYPASS:-1}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  web:
    profiles: ["app"]
    image: node:20-bookworm
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started
    command: >
      bash -lc "cd apps/web &&
      ./node_modules/.bin/vite --host 0.0.0.0 --port 5173"

  worker:
    profiles: ["app"]
    image: mentora-api
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DJANGO_DEBUG: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORAGE_BACKEND: s3
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-mentora}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-mentora}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-mentora-secret}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      api:
        condition: service_started
    command: >
      celery -A config worker
      -Q heavy,agent,learning
      -n worker@%h
      --loglevel=info

volumes:
  postgres_data:
  redis_data:
  minio_data:

