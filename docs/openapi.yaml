                  type: string
                  description: 上传会话 UUID
                sha256:
                  type: string
                  description: 文件 SHA-256 哈希（十六进制）
                size:
                  type: integer
                  description: 实际文件字节大小
                sync:
                  type: boolean
                  description: 是否同步等待解析完成，默认 true
              required:
              - uploadId
              - sha256
              - size
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 上传完成，解析已触发
          description: ''
