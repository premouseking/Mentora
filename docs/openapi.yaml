openapi: 3.0.3
info:
  title: Mentora API
  version: 1.0.0
  description: Mentora 智能学习工作空间 API
paths:
  /api/assessment/generation-jobs/{job_id}/:
    get:
      operationId: assessment_generation_jobs_retrieve
      parameters:
      - in: path
        name: job_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - assessment
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/assessment/sessions/{session_id}/:
    get:
      operationId: assessment_sessions_retrieve
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - assessment
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/assessment/sessions/{session_id}/attempts/:
    post:
      operationId: assessment_sessions_attempts_create
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - assessment
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/assessment/sessions/{session_id}/complete/:
    post:
      operationId: assessment_sessions_complete_create
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - assessment
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/assessment/sessions/generate/:
    post:
      operationId: assessment_sessions_generate_create
      description: LLM 根据课程资料自动生成题目并创建测验会话
      summary: 生成测验试卷
      tags:
      - assessment
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/assessment/sessions/reuse/:
    get:
      operationId: assessment_sessions_reuse_retrieve
      description: 按 cache key 参数查找可复用测验（任务练习预加载）。
      tags:
      - assessment
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/change-password/:
    post:
      operationId: auth_change_password_create
      summary: 修改密码
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                old_password:
                  type: string
                new_password:
                  type: string
                  description: 新密码，≥8 位
              required:
              - old_password
              - new_password
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 修改成功
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: 原密码错误或新密码太短
          description: ''
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: 验证邮箱密码，返回 JWT。
      summary: 用户登录
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 邮箱
                password:
                  type: string
                  description: 密码
              required:
              - email
              - password
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 登录成功，返回 JWT
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: 邮箱或密码错误
          description: ''
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      description: 将当前 refresh token 加入黑名单。
      summary: 登出
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh:
                  type: string
                  description: refresh token
              required:
              - refresh
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 登出成功
          description: ''
  /api/auth/profile/:
    get:
      operationId: auth_profile_retrieve
      description: 返回当前登录用户的资料。
      summary: 获取用户资料
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 用户资料
          description: ''
  /api/auth/profile/update/:
    patch:
      operationId: auth_profile_update_partial_update
      description: 修改当前用户的显示名称。
      summary: 更新用户资料
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                  description: 新显示名称
              required:
              - display_name
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 更新成功
          description: ''
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: 用 refresh token 换取新的 access token。
      summary: 刷新 Token
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh:
                  type: string
                  description: refresh token
              required:
              - refresh
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 新的 access token
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: refresh token 无效或过期
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: 创建新用户并返回 JWT。
      summary: 用户注册
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 邮箱
                password:
                  type: string
                  description: 密码，≥8 位
                display_name:
                  type: string
                  description: 显示名称
              required:
              - email
              - password
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                description: 注册成功，返回 JWT
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: 参数无效或邮箱已注册
          description: ''
  /api/chat/:
    post:
      operationId: chat_create
      description: 发送消息给 AI 助教，返回完整回复。TutorAgent 会在必要时检索资料后回答。
      summary: AI 聊天（非流式）
      tags:
      - Agent 聊天
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  description: 用户消息正文
                history:
                  type: array
                  description: 历史对话消息列表
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum:
                        - user
                        - assistant
                      content:
                        type: string
              required:
              - message
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 回复成功
                content:
                  application/json:
                    type: object
                    properties:
                      reply:
                        type: string
                        description: AI 回复正文
                      status:
                        type: string
                        enum:
                        - completed
                        - failed
                      usage:
                        type: object
                        description: Token 用量
                        properties:
                          prompt_tokens:
                            type: integer
                          completion_tokens:
                            type: integer
                          total_tokens:
                            type: integer
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: 请求参数无效（message 为空或 JSON 格式错误）
          description: ''
        '500':
          content:
            application/json:
              schema:
                description: Agent 运行异常
          description: ''
        '503':
          content:
            application/json:
              schema:
                description: LLM_API_KEY 未配置
          description: ''
  /api/chat/pipeline/:
    post:
      operationId: chat_pipeline_create
      description: 按顺序执行多步 Agent 编排。每一步指定 agent_role、任务指令和输出键名，后续步骤可通过 input_from
        引用前面步骤的输出。
      summary: Pipeline 编排（非流式）
      tags:
      - Agent 聊天
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                pipeline_steps:
                  type: array
                  description: Pipeline 步骤列表，按顺序执行
                  items:
                    type: object
                    properties:
                      agent_role:
                        type: string
                        enum:
                        - tutor
                        - clarifier
                        - planner
                        - assessor
                        description: Agent 角色
                      task_instruction:
                        type: string
                        description: 步骤任务指令
                      output_key:
                        type: string
                        description: 输出键名，供后续步骤引用
                      input_from:
                        type: string
                        description: 引用前面步骤的 output_key（可选）
                      max_tool_rounds:
                        type: integer
                        description: 最大工具调用轮次，默认 5
                    required:
                    - agent_role
                    - task_instruction
                    - output_key
                context_sources:
                  type: array
                  items:
                    type: string
                  description: 上下文资料版本 ID 列表
              required:
              - pipeline_steps
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Pipeline 完整执行结果
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: 参数无效
          description: ''
        '500':
          content:
            application/json:
              schema:
                description: Pipeline 执行异常
          description: ''
        '503':
          content:
            application/json:
              schema:
                description: LLM_API_KEY 未配置
          description: ''
  /api/chat/pipeline/stream/:
    post:
      operationId: chat_pipeline_stream_create
      description: 按顺序执行多步 Agent 编排，每步完成后推送 SSE 事件。事件类型包括 step_started/step_completed/error/done。
      summary: Pipeline 编排（流式 SSE）
      tags:
      - Agent 聊天
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                pipeline_steps:
                  type: array
                  description: Pipeline 步骤列表
                  items:
                    type: object
                    properties:
                      agent_role:
                        type: string
                        enum:
                        - tutor
                        - clarifier
                        - planner
                        - assessor
                      task_instruction:
                        type: string
                      output_key:
                        type: string
                      input_from:
                        type: string
                      max_tool_rounds:
                        type: integer
                    required:
                    - agent_role
                    - task_instruction
                    - output_key
                context_sources:
                  type: array
                  items:
                    type: string
                  description: 上下文资料版本 ID 列表
              required:
              - pipeline_steps
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            text/event-stream:
              schema:
                description: Pipeline SSE 事件流
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: 参数无效
          description: ''
        '503':
          content:
            application/json:
              schema:
                description: LLM_API_KEY 未配置
          description: ''
  /api/chat/stream/:
    post:
      operationId: chat_stream_create
      description: 发送消息给 AI 助教，通过 Server-Sent Events 流式返回回复内容。事件类型包括 chunk/status/citations/error/done。
      summary: AI 聊天（流式 SSE）
      tags:
      - Agent 聊天
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  description: 用户消息正文
                history:
                  type: array
                  description: 历史对话消息列表
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum:
                        - user
                        - assistant
                      content:
                        type: string
              required:
              - message
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            text/event-stream:
              schema:
                description: SSE 事件流
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: 请求参数无效
          description: ''
        '503':
          content:
            application/json:
              schema:
                description: LLM_API_KEY 未配置
          description: ''
  /api/courses/:
    get:
      operationId: courses_retrieve
      description: |-
        GET /api/courses/

        返回课程列表（按创建时间倒序）。
      tags:
      - courses
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/courses/{course_id}/:
    get:
      operationId: courses_retrieve_2
      description: |-
        GET /api/courses/<uuid:id>/

        返回课程详情：画像字段 + 当前作用域
      parameters:
      - in: path
        name: course_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - courses
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/courses/{course_id}/activate/:
    post:
      operationId: courses_activate_create
      description: |-
        POST /api/courses/<uuid:id>/activate/

        流程: draft → confirmed → plan_generate → create_plan_revision → active
      parameters:
      - in: path
        name: course_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - courses
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/courses/{course_id}/agent-sessions/:
    get:
      operationId: courses_agent_sessions_retrieve
      description: GET /api/courses/<course_id>/agent-sessions/
      summary: 列出课程 Agent 会话
      parameters:
      - in: path
        name: course_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - 课程 Agent
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/courses/{course_id}/agent-sessions/{session_id}/:
    get:
      operationId: courses_agent_sessions_retrieve_2
      description: GET /api/courses/<course_id>/agent-sessions/<session_id>/
      summary: 读取课程 Agent 会话详情
      parameters:
      - in: path
        name: course_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - 课程 Agent
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/courses/{course_id}/agent-sessions/stream/:
    post:
      operationId: courses_agent_sessions_stream_create
      description: POST /api/courses/<course_id>/agent-sessions/stream/
      summary: 课程 Agent 流式对话
      parameters:
      - in: path
        name: course_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - 课程 Agent
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/courses/{course_id}/files/:
    get:
      operationId: courses_files_retrieve
      description: 返回课程资料的文件树，按学习阶段分组。每个阶段为文件夹节点，内含该阶段关联的资料来源文件。
      summary: 课程文件树
      parameters:
      - in: path
        name: course_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - 课程管理
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 文件树
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: 课程不存在
          description: ''
  /api/courses/{course_id}/phases/:
    get:
      operationId: courses_phases_retrieve
      description: 返回课程的学习阶段列表及计划调整影响范围。阶段状态按学习进度推导。
      summary: 课程阶段列表
      parameters:
      - in: path
        name: course_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - 课程管理
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 阶段列表 + 调整影响
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: 课程不存在或无学习计划
          description: ''
  /api/courses/{course_id}/profile/:
    patch:
      operationId: courses_profile_partial_update
      description: |-
        PATCH /api/courses/<uuid:id>/profile/

        请求体：{"goal"?, "level"?, "pace"?, "school"?}
        返回：{profile_revision_id, status, goal, ...}
      parameters:
      - in: path
        name: course_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - courses
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/courses/{course_id}/scope/:
    post:
      operationId: courses_scope_create
      description: |-
        POST /api/courses/<uuid:id>/scope/

        请求体：{"source_version_ids": [...], "role"?: "reference"}
        返回：{scope_revision_id, source_version_ids, superseded_revision_id}
      parameters:
      - in: path
        name: course_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - courses
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/courses/{course_id}/scope-suggest/:
    get:
      operationId: courses_scope_suggest_retrieve
      description: |-
        GET /api/courses/<uuid:id>/scope-suggest/

        返回当前作用域和可加入的新资料列表。
      parameters:
      - in: path
        name: course_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - courses
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/courses/{course_id}/topics/:
    get:
      operationId: courses_topics_retrieve
      description: 返回课程主题的嵌套树结构。
      summary: 获取主题树
      parameters:
      - in: path
        name: course_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - courses
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 主题树
          description: ''
  /api/courses/{course_id}/topics/create/:
    post:
      operationId: courses_topics_create_create
      description: 从结构化数据批量创建课程主题树。已存在的主题会被清空重建。
      summary: 创建/更新主题树
      parameters:
      - in: path
        name: course_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - courses
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                topics:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: 主题名称
                      level:
                        type: integer
                        description: 层级
                      parent_index:
                        type: integer
                        description: 父主题在数组中的序号，-1 为根
                      position:
                        type: integer
                        description: 排序
                      estimated_minutes:
                        type: integer
                        description: 预估时长
              required:
              - topics
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                description: 创建成功
          description: ''
  /api/courses/confirm/:
    post:
      operationId: courses_confirm_create
      description: |-
        POST /api/courses/confirm/

        请求体：{"session_id": "..."}
        返回：{course_id, profile_revision_id, scope_revision_id, source_version_ids}
      tags:
      - courses
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/courses/sessions/:
    get:
      operationId: courses_sessions_retrieve
      description: |-
        GET  /api/courses/sessions/ → 列出所有建课会话
        POST /api/courses/sessions/ → 创建新会话
      tags:
      - courses
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: courses_sessions_create
      description: |-
        GET  /api/courses/sessions/ → 列出所有建课会话
        POST /api/courses/sessions/ → 创建新会话
      tags:
      - courses
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/courses/sessions/{session_id}/:
    get:
      operationId: courses_sessions_retrieve_2
      description: |-
        GET /api/courses/sessions/<uuid:id>/

        返回：{ "id", "goal", "level", "pace", "inquiry_history", "status", ... }
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - courses
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/courses/sessions/{session_id}/archive/:
    patch:
      operationId: courses_sessions_archive_partial_update
      description: PATCH /api/courses/sessions/<id>/archive/ — 软归档，保留数据。
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - courses
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/courses/sessions/{session_id}/delete/:
    delete:
      operationId: courses_sessions_delete_destroy
      description: |-
        DELETE /api/courses/sessions/<uuid:id>/

