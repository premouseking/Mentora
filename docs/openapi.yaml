openapi: 3.0.3
info:
  title: Mentora API
  version: 1.0.0
  description: Mentora 智能学习工作空间 API
paths:
  /api/assessment/sessions/{session_id}/:
    get:
      operationId: assessment_sessions_retrieve
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - assessment
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/assessment/sessions/{session_id}/attempts/:
    post:
      operationId: assessment_sessions_attempts_create
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - assessment
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/assessment/sessions/{session_id}/complete/:
    post:
      operationId: assessment_sessions_complete_create
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - assessment
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/assessment/sessions/generate/:
    post:
      operationId: assessment_sessions_generate_create
      description: LLM 根据课程资料自动生成题目并创建测验会话
      summary: 生成测验试卷
      tags:
      - assessment
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                course_session_id:
                  type: string
                source_version_ids:
                  type: array
                  items:
                    type: string
                count:
                  type: integer
                  default: 5
                difficulty:
                  type: string
                  default: 综合
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
  /api/chat/:
    post:
      operationId: chat_create
      description: POST /api/chat/
      tags:
      - chat
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/chat/stream/:
    post:
      operationId: chat_stream_create
      description: POST /api/chat/stream/
      tags:
      - chat
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/courses/:
    get:
      operationId: courses_retrieve
      description: |-
        GET /api/courses/

        返回课程列表（按创建时间倒序）。
      tags:
      - courses
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/courses/{course_id}/:
    get:
      operationId: courses_retrieve_2
      description: |-
        GET /api/courses/<uuid:id>/

        返回课程详情：画像字段 + 当前作用域
      parameters:
      - in: path
        name: course_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - courses
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/courses/{course_id}/activate/:
    post:
      operationId: courses_activate_create
      description: |-
        POST /api/courses/<uuid:id>/activate/

        流程: draft → confirmed → plan_generate → create_plan_revision → active
      parameters:
      - in: path
        name: course_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - courses
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/courses/{course_id}/profile/:
    patch:
      operationId: courses_profile_partial_update
      description: |-
        PATCH /api/courses/<uuid:id>/profile/

        请求体：{"goal"?, "level"?, "pace"?, "school"?}
        返回：{profile_revision_id, status, goal, ...}
      parameters:
      - in: path
        name: course_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - courses
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/courses/{course_id}/scope/:
    post:
      operationId: courses_scope_create
      description: |-
        POST /api/courses/<uuid:id>/scope/

        请求体：{"source_version_ids": [...], "role"?: "reference"}
        返回：{scope_revision_id, source_version_ids, superseded_revision_id}
      parameters:
      - in: path
        name: course_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - courses
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/courses/{course_id}/scope-suggest/:
    get:
      operationId: courses_scope_suggest_retrieve
      description: |-
        GET /api/courses/<uuid:id>/scope-suggest/

        返回当前作用域和可加入的新资料列表。
      parameters:
      - in: path
        name: course_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - courses
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/courses/confirm/:
    post:
      operationId: courses_confirm_create
      description: |-
        POST /api/courses/confirm/

        请求体：{"session_id": "..."}
        返回：{course_id, profile_revision_id, scope_revision_id, source_version_ids}
      tags:
      - courses
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/courses/sessions/:
    get:
      operationId: courses_sessions_list
      description: |-
        GET  /api/courses/sessions/ → 列出所有建课会话
      tags:
      - courses
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: 建课会话列表
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        course_id: { type: string, format: uuid, nullable: true }
                        goal: { type: string }
                        title: { type: string }
                        status: { type: string }
                        level: { type: string }
                        pace: { type: string }
                        time_budget: { type: string }
                        school: { type: string }
                        deadline: { type: string, format: date, nullable: true }
                        current_phase: { type: string, nullable: true }
                        next_task: { type: string, nullable: true }
                        created_at: { type: string, format: date-time }
                        updated_at: { type: string, format: date-time }
                        last_studied_at: { type: string, format: date-time, nullable: true }
                  count:
                    type: integer
    post:
      operationId: courses_sessions_create
      description: |-
        POST /api/courses/sessions/ → 创建新会话
      tags:
      - courses
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/courses/sessions/{session_id}/:
    get:
      operationId: courses_sessions_retrieve_2
      description: |-
        GET /api/courses/sessions/<uuid:id>/

        返回：{ "id", "goal", "level", "pace", "inquiry_history", "status", ... }
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - courses
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/courses/sessions/{session_id}/inquiry/:
    post:
      operationId: courses_sessions_inquiry_create
      description: |-
        POST /api/courses/sessions/<uuid:id>/inquiry/

        请求体（可选）：{ "answer": "用户回答" }
        返回：
        - 继续追问: { "ready": false, "questions": [{ "text","type","options","guidance" }] }
        - 信息充足: { "ready": true, "summary": "总结文本" }

        约束：
        - 首次调用不传 answer，触发首个问题
        - 每次回答后追加到 inquiry_history，发给 LLM 判断是否继续
        - 追问超过 MAX_INQUIRY_ROUNDS 轮后强制 ready=true
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - courses
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/courses/sessions/{session_id}/plan/:
    get:
      operationId: courses_sessions_plan_retrieve
      description: |-
        GET  /api/courses/sessions/<uuid:id>/plan/ → 返回当前生效的学习方案
        POST /api/courses/sessions/<uuid:id>/plan/ → 生成学习方案
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - courses
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
    post:
      operationId: courses_sessions_plan_create
      description: |-
        GET  /api/courses/sessions/<uuid:id>/plan/ → 返回当前生效的学习方案
        POST /api/courses/sessions/<uuid:id>/plan/ → 生成学习方案
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - courses
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/courses/sessions/{session_id}/update/:
    patch:
      operationId: courses_sessions_update_partial_update
      description: |-
        PATCH /api/courses/sessions/<uuid:id>/

        请求体：{ "level"?, "pace"? }
        返回：{ "status": "ok" }
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - courses
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/library/folders/:
    get:
      operationId: library_folders_retrieve
      description: 返回当前用户的文件夹列表，含子文件夹数和资料数。
      summary: 列出文件夹
      parameters:
      - in: query
        name: ownerId
        schema:
          type: string
        description: 所有者 ID
      tags:
      - library
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 文件夹列表
          description: ''
  /api/library/folders/{folder_id}/:
    patch:
      operationId: library_folders_partial_update
      summary: 重命名文件夹
      parameters:
      - in: path
        name: folder_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - library
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 新名称
              required:
              - name
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 重命名成功
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: 文件夹不存在
          description: ''
  /api/library/folders/{folder_id}/delete/:
    delete:
      operationId: library_folders_delete_destroy
      description: 只能删除空文件夹（无子文件夹且无资料）。
      summary: 删除文件夹
      parameters:
      - in: path
        name: folder_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - library
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 删除成功
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: 文件夹非空
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: 文件夹不存在
          description: ''
  /api/library/folders/create/:
    post:
      operationId: library_folders_create_create
      summary: 创建文件夹
      tags:
      - library
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 文件夹名称
                parentId:
                  type: string
                  description: 父文件夹 ID（可选）
                ownerId:
                  type: string
                  description: 所有者 ID
              required:
              - name
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                description: 创建成功
          description: ''
  /api/library/sources/:
    get:
      operationId: library_sources_retrieve
      description: 按所有者列出全部资料，可选按课程或标签过滤。tags 参数逗号分隔，取交集。
      summary: 列出资料库
      parameters:
      - in: query
        name: courseId
        schema:
          type: string
        description: 课程会话 ID，传入时仅返回已关联资料
      - in: query
        name: folderId
        schema:
          type: string
        description: 文件夹 ID，传入时仅返回该文件夹下的资料
      - in: query
        name: ownerId
        schema:
          type: string
        description: 所有者 ID
      - in: query
        name: q
        schema:
          type: string
        description: 搜索关键词，模糊匹配资料标题
      - in: query
        name: status
        schema:
          type: string
        description: '过滤状态: active/archived'
      - in: query
        name: tags
        schema:
          type: string
        description: 逗号分隔的标签，取交集过滤
      tags:
      - library
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 资料列表
          description: ''
  /api/library/sources/{source_id}/archive/:
    patch:
      operationId: library_sources_archive_partial_update
      description: 将资料状态设为 archived，保留历史回答可追溯。
      summary: 归档资料
      parameters:
      - in: path
        name: source_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - library
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 归档成功
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: 资料不存在
          description: ''
  /api/library/sources/{source_id}/delete/:
    delete:
      operationId: library_sources_delete_destroy
      description: 删除资料及 CASCADE 关联的版本、解析数据和检索证据。
      summary: 删除资料
      parameters:
      - in: path
        name: source_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - library
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 删除成功
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: 资料不存在
          description: ''
  /api/library/sources/{source_id}/move/:
    patch:
      operationId: library_sources_move_partial_update
      description: 将资料移入/移出文件夹。folderId 传 null 可移出文件夹。
      summary: 移动资料
      parameters:
      - in: path
        name: source_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - library
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                folderId:
                  type:
                  - string
                  - 'null'
                  description: 目标文件夹 ID，null 移出
              required:
              - folderId
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 移动成功
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: 资料不存在
          description: ''
  /api/library/sources/{source_id}/reparse/:
    post:
      operationId: library_sources_reparse_create
      description: 清理旧解析数据后重新触发同步解析管线。
      summary: 重新解析资料
      parameters:
      - in: path
        name: source_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - library
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 重新解析完成
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: 资料无版本记录
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: 资料不存在
          description: ''
  /api/library/sources/{source_id}/tags/:
    patch:
      operationId: library_sources_tags_partial_update
      description: 替换指定资料的标签列表。
      summary: 更新资料标签
      parameters:
      - in: path
        name: source_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - library
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: array
                  items:
                    type: string
                  description: 标签列表
              required:
              - tags
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 更新成功
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: 资料不存在
          description: ''
  /api/library/sources/{source_id}/unarchive/:
    patch:
      operationId: library_sources_unarchive_partial_update
      description: 将资料恢复为 active 状态。
      summary: 取消归档
      parameters:
      - in: path
        name: source_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - library
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 恢复成功
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: 资料不存在
          description: ''
  /api/library/sources/{source_version_id}/:
    get:
      operationId: library_sources_retrieve_2
      description: 返回资料元数据、版本信息与 ParsedBundle JSON（如已解析）。
      summary: 获取资料版本详情
      parameters:
      - in: path
        name: source_version_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - library
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 资料详情
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: 资料版本不存在
          description: ''
  /api/library/tags/:
    get:
      operationId: library_tags_retrieve
      description: 返回当前用户所有资料中已使用的标签合集。
      summary: 列出所有标签
      parameters:
      - in: query
        name: ownerId
        schema:
          type: string
        description: 所有者 ID
      tags:
      - library
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 标签列表
          description: ''
  /api/parsing/benchmark:
    get:
      operationId: parsing_benchmark_retrieve
      description: |-
        GET /api/parsing/benchmark

        运行基准测试并返回 JSON 报告。
      tags:
      - parsing
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/parsing/preview:
    post:
      operationId: parsing_preview_create
      description: |-
        POST /api/parsing/preview

        上传一个 PDF 文件，返回 ParsedBundle 和 EvidenceUnit 列表。
        用于前端解析实验室页面预览解析效果。
      tags:
      - parsing
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/retrieval/evidence/{evidence_id}/location:
    get:
      operationId: retrieval_evidence_location_retrieve
      description: 返回 EvidenceUnit 的页码、坐标与同页上下文。
      summary: 证据引用定位
      parameters:
      - in: path
        name: evidence_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - retrieval
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/retrieval/search:
    get:
      operationId: retrieval_search_retrieve
      description: FTS + Trgm + Vector RRF 三路融合检索，支持 fts/grep 两种模式。通过 course_id 限定作用域。
      summary: 混合检索
      tags:
      - retrieval
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/uploads/:
    post:
      operationId: uploads_create
      description: 创建上传会话，返回对象存储键和上传 ID。客户端应携带 uploadId 以便 complete 关联。
      summary: 创建上传会话
      tags:
      - uploads
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                filename:
                  type: string
                  description: 原始文件名
                size:
                  type: integer
                  description: 文件字节大小
                mediaType:
                  type: string
                  description: MIME 类型，默认 application/pdf
                ownerId:
                  type: string
                  description: 所有者 ID
                uploadId:
                  type: string
                  description: 客户端生成的 UUID，用于幂等关联
              required:
              - filename
              - size
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 上传会话创建成功
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: 参数无效
          description: ''
  /api/uploads/complete/:
    post:
      operationId: uploads_complete_create
      description: 校验文件 SHA256 与大小，创建 Source/SourceVersion，触发异步解析管线。
      summary: 完成上传并触发解析
      tags:
      - uploads
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                uploadId:
                  type: string
                  description: 上传会话 UUID
                sha256:
                  type: string
                  description: 文件 SHA-256 哈希（十六进制）
                size:
                  type: integer
                  description: 实际文件字节大小
                ownerId:
                  type: string
                  description: 所有者 ID
                sync:
                  type: boolean
                  description: 是否同步等待解析完成，默认 true
              required:
              - uploadId
              - sha256
              - size
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 上传完成，解析已触发
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: 校验失败（SHA256/大小不匹配）
          description: ''
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
