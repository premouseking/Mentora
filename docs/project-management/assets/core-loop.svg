<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#64748B"/></marker>
  </defs>

  <!-- center label -->
  <circle cx="360" cy="210" r="48" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <text x="360" y="206" text-anchor="middle" font-size="11" fill="#2563EB" font-weight="700">Mentora</text>
  <text x="360" y="222" text-anchor="middle" font-size="10" fill="#64748B">学习引擎</text>

  <!-- node 1: 模糊诉求 (top) -->
  <rect x="266" y="24" width="188" height="62" rx="12" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="360" y="52" text-anchor="middle" font-size="14" fill="#C2410C" font-weight="700">🔍 模糊诉求</text>
  <text x="360" y="72" text-anchor="middle" font-size="10" fill="#9A3412">"我想学AI" / 上传资料</text>

  <!-- node 2: 结构化澄清 (top-right) -->
  <rect x="510" y="120" width="188" height="62" rx="12" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="604" y="148" text-anchor="middle" font-size="14" fill="#15803D" font-weight="700">📋 结构化澄清</text>
  <text x="604" y="168" text-anchor="middle" font-size="10" fill="#166534">问题卡 → 画像确认</text>

  <!-- node 3: 学习计划 (bottom-right) -->
  <rect x="510" y="280" width="188" height="62" rx="12" fill="#F0F9FF" stroke="#0284C7" stroke-width="1.5"/>
  <text x="604" y="308" text-anchor="middle" font-size="14" fill="#0369A1" font-weight="700">📅 可编辑学习计划</text>
  <text x="604" y="328" text-anchor="middle" font-size="10" fill="#075985">Phase→Unit→Task 卡片</text>

  <!-- node 4: 继续学习 (bottom) -->
  <rect x="266" y="334" width="188" height="62" rx="12" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="360" y="362" text-anchor="middle" font-size="14" fill="#A16207" font-weight="700">▶ "继续学习"</text>
  <text x="360" y="382" text-anchor="middle" font-size="10" fill="#854D0E">原文讲解 + 例题 + 练习</text>

  <!-- node 5: 掌握度评估 (bottom-left) -->
  <rect x="22" y="280" width="188" height="62" rx="12" fill="#FDF2F8" stroke="#DB2777" stroke-width="1.5"/>
  <text x="116" y="308" text-anchor="middle" font-size="14" fill="#BE185D" font-weight="700">📊 多维掌握度评估</text>
  <text x="116" y="328" text-anchor="middle" font-size="10" fill="#9D174D">证据加权 + FSRS 复习</text>

  <!-- node 6: 调整路径 (top-left) -->
  <rect x="22" y="120" width="188" height="62" rx="12" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="116" y="148" text-anchor="middle" font-size="14" fill="#6D28D9" font-weight="700">🎯 调整路径</text>
  <text x="116" y="168" text-anchor="middle" font-size="10" fill="#5B21B6">薄弱环节 → 重新规划</text>

  <!-- arrows clockwise -->
  <line x1="360" y1="86" x2="360" y2="120" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="454" y1="150" x2="510" y2="150" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="604" y1="182" x2="604" y2="280" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="310" x2="454" y2="310" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="396" x2="360" y2="334" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="266" y1="310" x2="210" y2="310" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="116" y1="280" x2="116" y2="182" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="210" y1="150" x2="266" y2="150" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>